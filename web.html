<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: rgb(240, 240, 240);
    }

    /* HEADER AREA */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(17, 17, 17);
      color: rgb(255, 255, 255);
      padding: 15px 50px; /* increased for more corner spacing */
    }

    .logo {
      color: rgb(255, 51, 0);
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-right: 100px;
    }

    /* NAVIGATION MENU */
    .nav {
      display: flex;
      align-items: center;
      gap: 40px; /* more distance between items */
    }

    .nav-links {
      display: flex;
      justify-content: space-evenly; /* equal spacing between links */
      gap: 20px; /* balanced spacing */
    }

    .nav-links div {
      cursor: pointer;
      transition: color 0.3s;
    }

    .nav-links div:hover {
      color: rgb(0, 188, 212);
    }

    .hire-btn {
      background-color: rgb(255, 89, 0);
      color: rgb(255, 255, 255);
      border: none;
      padding: 10px 22px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s;
      margin-left: 100px; /* extra space before button */
    }

    .hire-btn:hover {
      background-color: rgb(0, 139, 163);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="nav">
      <div class="logo">LOGO</div>
        <div class="nav-links">
          <div>Home</div>
          <div>Services</div>
          <div>About Me</div>
          <div>Portfolio</div>
          <div>Contact Me</div>
        </div>
       <button class="hire-btn">Hire Me</button>
    </div>
  </div>
</body>
</html>
